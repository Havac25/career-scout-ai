<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAREER SCOUT AI // MISSION CONTROL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* =========================================================
       CAREER SCOUT AI — MISSION CONTROL
       Cyberpunk / Neon Gaming Theme
       ========================================================= */

    :root {
      --bg:            #07080f;
      --bg-panel:      rgba(6, 12, 24, 0.9);
      --bg-row-hover:  rgba(0, 229, 255, 0.04);
      --bg-row-active: rgba(0, 229, 255, 0.07);
      --bg-detail:     rgba(2, 8, 18, 0.7);

      --cyan:    #00e5ff;
      --magenta: #ff00cc;
      --green:   #00ff6a;
      --yellow:  #f5e642;
      --orange:  #ff8c00;
      --red:     #ff2255;

      --text:    #a8bfcc;
      --dim:     #3a5060;
      --border:  rgba(0, 229, 255, 0.18);

      --font-display: 'Orbitron', monospace;
      --font-mono:    'Share Tech Mono', monospace;

      --glow-cyan:    0 0 8px var(--cyan), 0 0 20px rgba(0,229,255,0.3);
      --glow-cyan-sm: 0 0 6px rgba(0,229,255,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 17px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background grid ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* ── CRT scanlines ────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.05) 3px,
        rgba(0,0,0,0.05) 4px
      );
      pointer-events: none;
    }

    /* ── Ambient colour blobs ─────────────────────────────── */
    .ambient {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(120px);
    }
    .ambient-tl {
      width: 700px; height: 700px;
      top: -250px; left: -200px;
      background: radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 70%);
    }
    .ambient-br {
      width: 600px; height: 600px;
      bottom: -200px; right: -150px;
      background: radial-gradient(circle, rgba(255,0,204,0.04) 0%, transparent 70%);
    }

    /* ── Root layout ──────────────────────────────────────── */
    #root {
      position: relative; z-index: 2;
      max-width: 1380px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* =========================================================
       HEADER
       ========================================================= */
    header { text-align: center; margin-bottom: 2.5rem; }

    .hdr-frame {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.2rem;
    }
    .hdr-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.4;
    }
    .hdr-badge {
      font-family: var(--font-mono);
      font-size: 0.6rem; letter-spacing: 3px;
      color: var(--cyan); border: 1px solid var(--border);
      padding: 3px 10px; opacity: 0.7;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.7rem, 4.2vw, 3.0rem);
      font-weight: 900; letter-spacing: 0.12em;
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
      animation: glitch 10s infinite;
      position: relative;
    }

    /* Glitch layering via pseudo-elements */
    h1::before, h1::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      font-family: inherit; font-size: inherit; font-weight: inherit;
      letter-spacing: inherit;
    }
    h1::before { color: var(--magenta); clip-path: polygon(0 30%,100% 30%,100% 50%,0 50%); animation: glitch-before 10s infinite; }
    h1::after  { color: var(--green);   clip-path: polygon(0 60%,100% 60%,100% 75%,0 75%); animation: glitch-after  10s infinite; }

    @keyframes glitch {
      0%,89%,100% { transform: none; }
      90%          { transform: translateX(-2px) skewX(-1deg); }
      91%          { transform: translateX(2px); }
      92%          { transform: none; }
      93%          { transform: translateX(-1px); }
      94%          { transform: none; }
    }
    @keyframes glitch-before {
      0%,89%,100% { transform: none; opacity: 0; }
      90%          { transform: translateX(3px); opacity: 0.7; }
      91%          { opacity: 0; }
    }
    @keyframes glitch-after {
      0%,91%,100% { transform: none; opacity: 0; }
      92%          { transform: translateX(-3px); opacity: 0.6; }
      93%          { opacity: 0; }
    }

    .subtitle {
      font-size: 0.8rem; letter-spacing: 5px;
      color: #7693a6; margin-top: 0.6rem;
    }

    /* ── Date filter ─────────────────────────────────────── */
    .date-filter {
      display: flex; align-items: center; justify-content: center;
      gap: 0.8rem; margin-top: 1.2rem;
    }
    .date-label {
      font-size: 0.65rem; letter-spacing: 2.5px; color: #7693a6;
    }
    .date-input {
      font-family: var(--font-mono); font-size: 0.8rem;
      background: var(--bg-panel); color: var(--cyan);
      border: 1px solid var(--border); padding: 0.4rem 0.7rem;
      border-radius: 0;
    }
    .date-input:focus { outline: 1px solid var(--cyan); }

    /* ── Stats bar ────────────────────────────────────────── */
    .stats-bar {
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 0; margin-top: 1.8rem;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      backdrop-filter: blur(8px);
    }
    .stat {
      flex: 1; min-width: 120px;
      padding: 0.9rem 1.5rem; text-align: center;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .stat:last-child { border-right: none; }
    .stat-lbl {
      display: block; font-size: 0.65rem; letter-spacing: 2.5px;
      color: #7693a6; margin-bottom: 0.35rem;
    }
    .stat-val {
      display: block; font-family: var(--font-display);
      font-size: 1.15rem; font-weight: 700;
      color: var(--cyan); text-shadow: var(--glow-cyan-sm);
    }

    /* Pulse on stat values while loading */
    .stat-val.loading { animation: pulse-dim 1s step-start infinite; }
    @keyframes pulse-dim {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* =========================================================
       TABLE WRAPPER
       ========================================================= */
    .table-wrap {
      border: 1px solid var(--border);
      background: var(--bg-panel);
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    .table-topbar {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,229,255,0.025);
    }
    .table-label {
      font-family: var(--font-display);
      font-size: 0.6rem; letter-spacing: 3px; color: var(--cyan);
    }
    .table-meta {
      font-size: 0.7rem; letter-spacing: 1px; color: #7693a6;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-family: var(--font-display);
      font-size: 0.65rem; letter-spacing: 2.5px; font-weight: 600;
      color: #7693a6; text-align: left;
      padding: 0.75rem 1.4rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap; user-select: none;
    }
    thead th.th-score { text-align: right; padding-right: 2rem; }

    /* ── Offer rows ────────────────────────────────────────── */
    .offer-row {
      cursor: pointer;
      border-left: 3px solid transparent;
      border-bottom: 1px solid rgba(0,229,255,0.05);
      transition: background 0.18s, border-color 0.18s;
      opacity: 0;
      animation: row-in 0.35s ease forwards;
      animation-delay: var(--delay, 0ms);
    }
    @keyframes row-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: none; }
    }

    .offer-row:hover  { background: var(--bg-row-hover);  border-left-color: rgba(0,229,255,0.4); }
    .offer-row.active { background: var(--bg-row-active); border-left-color: var(--cyan); }

    .offer-row td { padding: 0.9rem 1.4rem; vertical-align: middle; }

    .rank {
      font-family: var(--font-display); font-size: 0.75rem;
      color: #7693a6; width: 2.8rem;
    }

    /* Job title column */
    .td-title { max-width: 380px; }
    .job-title {
      font-size: 0.92rem; font-weight: bold;
      color: #c8dde8; line-height: 1.4;
    }
    .portal-tag {
      display: inline-block; font-size: 0.5rem; letter-spacing: 1px;
      padding: 1px 5px; border-radius: 2px;
      margin-left: 0.4rem; vertical-align: middle; opacity: 0.75;
    }
    .tag-jji { background: rgba(255,140,0,0.12); color: #ff8c00; border: 1px solid rgba(255,140,0,0.25); }
    .tag-nfj { background: rgba(180,0,255,0.12); color: #c840ff; border: 1px solid rgba(180,0,255,0.25); }

    /* Company column */
    .company { font-size: 0.85rem; color: #8faebd; }

    /* ── Score bar cell ───────────────────────────────────── */
    .score-cell {
      display: flex; align-items: center;
      gap: 0.7rem; justify-content: flex-end;
      padding-right: 0.6rem;
    }
    .score-track {
      width: 110px; height: 5px;
      background: rgba(255,255,255,0.07); border-radius: 3px; overflow: hidden;
    }
    .score-fill {
      height: 100%; border-radius: 3px;
      width: 0%;  /* animated by JS */
      transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .score-fill.high { animation: bar-pulse 2s ease-in-out infinite; }
    @keyframes bar-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.65; }
    }

    .score-num {
      font-family: var(--font-display); font-size: 0.88rem; font-weight: 700;
      min-width: 2.8ch; text-align: right;
    }
    .score-tier {
      font-size: 0.5rem; letter-spacing: 2px; opacity: 0.85;
      min-width: 8ch;
    }

    /* ── Expand indicator ─────────────────────────────────── */
    .chevron {
      display: inline-block; font-size: 0.5rem;
      color: var(--dim); transition: transform 0.3s, color 0.2s;
      margin-left: 0.3rem;
    }
    .offer-row.active .chevron { transform: rotate(180deg); color: var(--cyan); }

    /* =========================================================
       DETAIL EXPANSION ROW
       ========================================================= */
    .detail-row { border-bottom: 1px solid var(--border); }
    .detail-row td { padding: 0; border: none; }

    .detail-wrap {
      max-height: 0; overflow: hidden;
      transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .detail-wrap.open { max-height: 860px; }

    .detail-inner {
      padding: 1.2rem 1.6rem 1.8rem;
      background: var(--bg-detail);
      border-top: 1px solid rgba(0,229,255,0.1);
    }

    /* ── Tabs ─────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 2px;
      padding: 0.55rem 1.3rem;
      background: transparent; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; color: #7693a6;
      transition: color 0.2s, border-color 0.2s, text-shadow 0.2s;
      position: relative; bottom: -1px;
    }
    .tab-btn:hover  { color: var(--cyan); }
    .tab-btn.active {
      color: var(--cyan); border-bottom-color: var(--cyan);
      text-shadow: 0 0 8px var(--cyan);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* ── AI Analysis panel ────────────────────────────────── */
    .ai-quote {
      font-size: 0.84rem; line-height: 1.75;
      color: var(--text);
      padding: 1rem 1.1rem;
      background: rgba(0,229,255,0.03);
      border-left: 2px solid var(--cyan);
      margin-bottom: 1rem;
    }

    .meta-strip {
      display: flex; flex-wrap: wrap; gap: 1.2rem;
    }
    .meta-kv { font-size: 0.70rem; letter-spacing: 0.5px; }
    .meta-k { color: #7693a6; margin-right: 0.3rem; }
    .meta-v { color: var(--cyan); }

    /* ── Offer Details panel ──────────────────────────────── */
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.6rem;
      margin-bottom: 1.1rem;
    }
    .detail-card {
      padding: 0.55rem 0.8rem;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.055);
    }
    .detail-card-lbl {
      display: block; font-size: 0.6rem; letter-spacing: 2px;
      color: #7693a6; margin-bottom: 0.3rem;
    }
    .detail-card-val { font-size: 0.78rem; color: var(--text); }

    .desc-box {
      font-size: 0.85rem; line-height: 1.65; color: var(--text);
      max-height: 260px; overflow-y: auto;
      padding: 0.75rem 0.9rem;
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 1rem;
    }
    .desc-box::-webkit-scrollbar { width: 3px; }
    .desc-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    .desc-box::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 2px; }

    .view-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-family: var(--font-display); font-size: 0.6rem; letter-spacing: 2px;
      color: var(--cyan); text-decoration: none;
      border: 1px solid var(--cyan);
      padding: 0.5rem 1.2rem;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .view-link:hover {
      background: rgba(0,229,255,0.1);
      box-shadow: var(--glow-cyan);
      text-shadow: 0 0 8px var(--cyan);
    }

    /* =========================================================
       LOADING / EMPTY / ERROR STATES
       ========================================================= */
    .state-row td {
      text-align: center; padding: 4rem 2rem;
    }
    .scanning-text {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 4px;
      color: var(--cyan); animation: pulse-dim 0.8s step-start infinite;
    }
    .error-text {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 3px;
      color: var(--red);
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.15; margin-bottom: 1rem; }
    .empty-text {
      font-family: var(--font-display); font-size: 0.65rem; letter-spacing: 3px;
      color: var(--dim); line-height: 2;
    }

    /* =========================================================
       LOAD MORE
       ========================================================= */
    .load-more-wrap {
      display: none; text-align: center; padding: 2.2rem 0 0;
    }
    .load-more-btn {
      font-family: var(--font-display); font-size: 0.62rem; letter-spacing: 3px;
      color: var(--cyan); background: transparent;
      border: 1px solid var(--border);
      padding: 0.75rem 3.5rem; cursor: pointer;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .load-more-btn:hover {
      border-color: var(--cyan);
      background: rgba(0,229,255,0.06);
      box-shadow: 0 0 24px rgba(0,229,255,0.2), inset 0 0 20px rgba(0,229,255,0.04);
      text-shadow: 0 0 8px var(--cyan);
    }
    .load-more-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* =========================================================
       FOOTER
       ========================================================= */
    footer {
      text-align: center; margin-top: 3.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(0,229,255,0.08);
    }
    .footer-line {
      font-size: 0.65rem; letter-spacing: 3px; color: #7693a6;
    }
    .footer-status { color: var(--green); }

    /* =========================================================
       RESPONSIVE
       ========================================================= */
    @media (max-width: 720px) {
      .score-tier, .score-track { display: none; }
      .company { display: none; }
      .score-cell { padding-right: 0; }
      .offer-row td { padding: 0.7rem 0.8rem; }
      thead th { padding: 0.6rem 0.8rem; }
      .stats-bar { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <!-- Ambient glow blobs -->
  <div class="ambient ambient-tl"></div>
  <div class="ambient ambient-br"></div>

  <div id="root">

    <!-- ===== HEADER ===== -->
    <header>
      <div class="hdr-frame">
        <div class="hdr-line"></div>
        <div class="hdr-badge">SYS_ONLINE</div>
        <div class="hdr-line"></div>
      </div>

      <h1 data-text="CAREER SCOUT AI">CAREER SCOUT AI</h1>
      <p class="subtitle">// JOB MISSION CONTROL //</p>

      <div class="date-filter">
        <label for="since-input" class="date-label">SHOW OFFERS SINCE</label>
        <input type="datetime-local" id="since-input" class="date-input" />
      </div>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-lbl">TARGETS ACQUIRED</span>
          <span class="stat-val loading" id="s-total">—</span>
        </div>
        <div class="stat">
          <span class="stat-lbl">AVG MATCH SCORE</span>
          <span class="stat-val loading" id="s-avg">—</span>
        </div>
        <div class="stat">
          <span class="stat-lbl">TOP SCORE</span>
          <span class="stat-val loading" id="s-max">—</span>
        </div>
        <div class="stat">
          <span class="stat-lbl">LAST SCAN</span>
          <span class="stat-val loading" id="s-scan" style="font-size:.75rem">—</span>
        </div>
      </div>
    </header>

    <!-- ===== TABLE ===== -->
    <div class="table-wrap">
      <div class="table-topbar">
        <span class="table-label">// MISSION TARGETS</span>
        <span class="table-meta" id="tbl-meta">LOADING...</span>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:3rem">#</th>
            <th>DESIGNATION</th>
            <th>CORPORATION</th>
            <th class="th-score">MATCH SCORE</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="state-row">
            <td colspan="4"><span class="scanning-text">SCANNING DATABASE...</span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- ===== LOAD MORE ===== -->
    <div class="load-more-wrap" id="load-more-wrap">
      <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">
        LOAD MORE TARGETS
      </button>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
      <p class="footer-line">
        CAREER SCOUT AI &nbsp;·&nbsp;
        <span class="footer-status">● SYSTEM ONLINE</span>
      </p>
    </footer>

  </div><!-- /#root -->

  <script>
  /* ============================================================
     CAREER SCOUT AI — Mission Control
     Front-end logic
     ============================================================ */

  const S = {
    items: [],
    offset: 0,
    limit: 50,
    hasMore: false,
    expandedId: null,
    loading: false,
    since: null,  // datetime string for API filtering
  };

  /* ── Date filter ─────────────────────────────────────────── */
  function initDateFilter() {
    const inp = document.getElementById('since-input');
    // Default: 7 days ago
    const def = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
    // datetime-local expects YYYY-MM-DDTHH:MM
    inp.value = toLocalISOString(def);
    S.since = inp.value;

    inp.addEventListener('change', () => {
      S.since = inp.value;
      S.items = [];
      S.offset = 0;
      S.hasMore = false;
      S.expandedId = null;
      loadStats();
      loadOffers(false);
    });
  }

  function toLocalISOString(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function sinceParam() {
    if (!S.since) return '';
    // Convert local datetime-local value to ISO string for the API
    return `&since=${encodeURIComponent(S.since + ':00')}`;
  }

  /* ── Score helpers ────────────────────────────────────────── */
  function scoreColor(v) {
    if (v >= 0.85) return '#00ff6a';
    if (v >= 0.70) return '#00e5ff';
    if (v >= 0.50) return '#f5e642';
    if (v >= 0.30) return '#ff8c00';
    return '#ff2255';
  }

  function scoreTier(v) {
    if (v >= 0.85) return 'CRITICAL';
    if (v >= 0.70) return 'STRONG';
    if (v >= 0.50) return 'CANDIDATE';
    if (v >= 0.30) return 'BACKUP';
    return 'REJECT';
  }

  /* ── Date helpers ─────────────────────────────────────────── */
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const sec = (Date.now() - new Date(iso)) / 1000;
    if (sec < 3600)  return Math.round(sec / 60)    + 'm ago';
    if (sec < 86400) return Math.round(sec / 3600)  + 'h ago';
    return Math.round(sec / 86400) + 'd ago';
  }

  /* ── Sanitise ─────────────────────────────────────────────── */
  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Strip HTML tags → plain text (for description field)
  function stripHtml(html) {
    if (!html) return '';
    const d = document.createElement('div');
    d.innerHTML = html
      .replace(/<br\s*\/?>/gi,   '\n')
      .replace(/<\/p>/gi,         '\n')
      .replace(/<\/li>/gi,        '\n')
      .replace(/<\/div>/gi,       '\n');
    return (d.textContent || d.innerText || '').trim();
  }

  /* ── Build one table-row pair ─────────────────────────────── */
  function buildRow(item, rank, delay) {
    const col  = scoreColor(item.score);
    const tier = scoreTier(item.score);
    const pct  = Math.round(item.score * 100);
    const high = item.score >= 0.85;

    const portalClass = item.portal === 'justjoinit' ? 'tag-jji' : 'tag-nfj';
    const portalLabel = item.portal === 'justjoinit' ? 'JJI'     : 'NFJ';

    const detailCards = [
      item.location       ? ['LOCATION',     esc(item.location)]       : null,
      item.workplace_type ? ['WORKPLACE',     esc(item.workplace_type.toUpperCase())] : null,
      item.contract_types ? ['CONTRACT',      esc(item.contract_types)] : null,
      item.salary         ? ['COMPENSATION',  esc(item.salary)]         : null,
      item.posted_at      ? ['POSTED',        fmtDate(item.posted_at)]  : null,
                            ['SCRAPED',       fmtDate(item.scraped_at)],
                            ['PORTAL',        portalLabel],
    ]
    .filter(Boolean)
    .map(([k,v]) => `
      <div class="detail-card">
        <span class="detail-card-lbl">${k}</span>
        <span class="detail-card-val">${v}</span>
      </div>`)
    .join('');

    return `
<tr class="offer-row" id="row-${item.id}"
    style="--delay:${delay}ms"
    onclick="toggle(${item.id})">
  <td><span class="rank">${String(rank).padStart(2,'0')}</span></td>
  <td class="td-title">
    <div class="job-title">
      ${esc(item.title)}
      <span class="portal-tag ${portalClass}">${portalLabel}</span>
    </div>
  </td>
  <td><div class="company">${esc(item.company)}</div></td>
  <td>
    <div class="score-cell">
      <div class="score-track">
        <div class="score-fill ${high ? 'high' : ''}"
             id="fill-${item.id}"
             style="background:${col}; box-shadow:0 0 6px ${col}">
        </div>
      </div>
      <span class="score-num" style="color:${col};text-shadow:0 0 6px ${col}">${pct}</span>
      <span class="score-tier" style="color:${col}">${tier}</span>
      <span class="chevron">▼</span>
    </div>
  </td>
</tr>
<tr class="detail-row" id="drow-${item.id}">
  <td colspan="4">
    <div class="detail-wrap" id="dwrap-${item.id}">
      <div class="detail-inner">

        <!-- TABS -->
        <div class="tabs" id="tabs-${item.id}">
          <button class="tab-btn active"
                  onclick="switchTab(event,${item.id},'analysis')">AI ANALYSIS</button>
          <button class="tab-btn"
                  onclick="switchTab(event,${item.id},'details')">OFFER DETAILS</button>
        </div>

        <!-- AI ANALYSIS -->
        <div class="panel active" id="pan-analysis-${item.id}">
          <div class="ai-quote">${esc(item.summary)}</div>
          <div class="meta-strip">
            <span class="meta-kv">
              <span class="meta-k">SCORE</span>
              <span class="meta-v" style="color:${col}">${pct}/100</span>
            </span>
            <span class="meta-kv">
              <span class="meta-k">TIER</span>
              <span class="meta-v" style="color:${col}">${tier}</span>
            </span>
            <span class="meta-kv">
              <span class="meta-k">AGENT</span>
              <span class="meta-v">${esc(item.agent_name)}</span>
            </span>
            <span class="meta-kv">
              <span class="meta-k">MODEL</span>
              <span class="meta-v">${esc(item.model_name)}</span>
            </span>
            <span class="meta-kv">
              <span class="meta-k">EVALUATED</span>
              <span class="meta-v">${fmtDate(item.scored_at)}</span>
            </span>
          </div>
        </div>

        <!-- OFFER DETAILS -->
        <div class="panel" id="pan-details-${item.id}">
          <div class="detail-grid">${detailCards}</div>
          <div class="desc-box" id="desc-${item.id}"></div>
          <a class="view-link" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">
            VIEW FULL OFFER &nbsp;→
          </a>
        </div>

      </div>
    </div>
  </td>
</tr>`;
  }

  /* ── Append rows to tbody ─────────────────────────────────── */
  function appendRows(items, startRank) {
    const tbody = document.getElementById('tbody');
    const base  = startRank - 1; // 0-indexed

    items.forEach((item, i) => {
      const delay = i * 35; // stagger animation
      const tmpl  = document.createElement('template');
      tmpl.innerHTML = buildRow(item, base + i + 1, delay);
      while (tmpl.content.firstChild) {
        tbody.appendChild(tmpl.content.firstChild);
      }
      // Set description safely via textContent (avoids XSS)
      const descEl = document.getElementById(`desc-${item.id}`);
      if (descEl) descEl.textContent = stripHtml(item.description) || 'No description available.';
    });

    // Animate score bars after paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      items.forEach(item => {
        const fill = document.getElementById(`fill-${item.id}`);
        if (fill) fill.style.width = Math.round(item.score * 100) + '%';
      });
    }));
  }

  /* ── Stats bar ────────────────────────────────────────────── */
  async function loadStats() {
    try {
      const r = await fetch('/api/stats?' + sinceParam());
      const d = await r.json();
      ['s-total','s-avg','s-max','s-scan'].forEach(id => {
        document.getElementById(id).classList.remove('loading');
      });
      document.getElementById('s-total').textContent = d.total;
      document.getElementById('s-avg').textContent =
        d.avg_score ? Math.round(d.avg_score * 100) : '—';
      document.getElementById('s-max').textContent =
        d.max_score ? Math.round(d.max_score * 100) : '—';
      document.getElementById('s-scan').textContent = d.last_scan ? timeAgo(d.last_scan) : '—';
    } catch (e) {
      console.warn('Stats load failed', e);
    }
  }

  /* ── Main data fetch ──────────────────────────────────────── */
  async function loadOffers(append = false) {
    if (S.loading) return;
    S.loading = true;

    const btn = document.getElementById('load-more-btn');
    if (btn) btn.disabled = true;

    try {
      const url = `/api/recommendations?offset=${S.offset}&limit=${S.limit}${sinceParam()}`;
      const res = await fetch(url);
      const data = await res.json();

      const tbody = document.getElementById('tbody');
      if (!append) tbody.innerHTML = '';

      if (!data.items.length && !append) {
        tbody.innerHTML = `
          <tr class="state-row"><td colspan="4">
            <div class="empty-icon">◈</div>
            <div class="empty-text">NO TARGETS IN RANGE<br>Run the scanner to populate data</div>
          </td></tr>`;
        document.getElementById('tbl-meta').textContent = '0 TARGETS';
        return;
      }

      const startRank = S.items.length + 1;
      S.items  = [...S.items, ...data.items];
      S.offset += data.items.length;
      S.hasMore = data.has_more;

      appendRows(data.items, startRank);

      const shown = S.items.length;
      const total = data.total;
      document.getElementById('tbl-meta').textContent =
        `${shown} OF ${total} TARGETS · SINCE ${S.since.replace('T', ' ')}`;

      const wrap = document.getElementById('load-more-wrap');
      wrap.style.display = S.hasMore ? 'block' : 'none';
      if (btn) btn.disabled = false;

    } catch (e) {
      console.error('Load failed', e);
      document.getElementById('tbody').innerHTML = `
        <tr class="state-row"><td colspan="4">
          <span class="error-text">SCAN FAILED — DATABASE UNREACHABLE</span>
        </td></tr>`;
    } finally {
      S.loading = false;
      if (btn) btn.disabled = false;
    }
  }

  function loadMore() { loadOffers(true); }

  /* ── Accordion toggle ─────────────────────────────────────── */
  function toggle(id) {
    const wrap = document.getElementById(`dwrap-${id}`);
    const row  = document.getElementById(`row-${id}`);

    if (S.expandedId === id) {
      wrap.classList.remove('open');
      row.classList.remove('active');
      S.expandedId = null;
    } else {
      if (S.expandedId !== null) {
        const pw = document.getElementById(`dwrap-${S.expandedId}`);
        const pr = document.getElementById(`row-${S.expandedId}`);
        if (pw) pw.classList.remove('open');
        if (pr) pr.classList.remove('active');
      }
      wrap.classList.add('open');
      row.classList.add('active');
      S.expandedId = id;
    }
  }

  /* ── Tab switcher ─────────────────────────────────────────── */
  function switchTab(evt, id, tab) {
    evt.stopPropagation();

    const a  = document.getElementById(`pan-analysis-${id}`);
    const d  = document.getElementById(`pan-details-${id}`);
    const btns = document.querySelectorAll(`#tabs-${id} .tab-btn`);

    btns.forEach(b => b.classList.remove('active'));
    evt.currentTarget.classList.add('active');

    if (tab === 'analysis') {
      a.classList.add('active');
      d.classList.remove('active');
    } else {
      d.classList.add('active');
      a.classList.remove('active');
    }
  }

  /* ── Boot ─────────────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', () => {
    initDateFilter();
    loadStats();
    loadOffers(false);
  });
  </script>
</body>
</html>
